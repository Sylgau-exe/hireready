<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HireReady — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root { --bg:#050a12; --bg2:#0b1120; --card:#141c2e; --border:rgba(255,255,255,0.07); --text:#f1f5f9; --text2:#94a3b8; --accent:#38bdf8; --gradient:linear-gradient(135deg,#38bdf8,#818cf8); --glow:rgba(56,189,248,0.25); --success:#34d399; --danger:#f87171; }
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding:2rem;max-width:1200px;margin:0 auto;}
h1{font-size:1.8rem;margin-bottom:0.5rem;}
.subtitle{color:var(--text2);margin-bottom:2rem;}
.back-link{color:var(--accent);text-decoration:none;display:inline-block;margin-bottom:1rem;font-size:0.9rem;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
.stat-card .num{font-size:2rem;font-weight:700;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.stat-card .label{color:var(--text2);font-size:0.8rem;margin-top:0.25rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.5rem;margin-bottom:1.5rem;}
.card h3{font-size:1.1rem;margin-bottom:1rem;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;padding:0.75rem 1rem;color:var(--text2);font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;border-bottom:1px solid var(--border);}
td{padding:0.75rem 1rem;border-bottom:1px solid var(--border);font-size:0.9rem;}
tr:hover td{background:rgba(255,255,255,0.02);}
.badge{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.75rem;font-weight:600;}
.badge-admin{background:rgba(56,189,248,0.15);color:var(--accent);}
.badge-google{background:rgba(52,211,153,0.15);color:var(--success);}
.btn-sm{padding:0.35rem 0.7rem;border:none;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:500;font-family:inherit;}
.btn-del{background:rgba(248,113,113,0.1);color:var(--danger);}
.btn-del:hover{background:rgba(248,113,113,0.2);}
.error{color:var(--danger);margin:1rem 0;}
</style>
</head>
<body>
<a href="/dashboard" class="back-link">← Back to Dashboard</a>
<h1>🛠️ Admin Dashboard</h1>
<p class="subtitle">HireReady platform statistics and user management</p>

<div class="stats-row" id="statsRow">
  <div class="stat-card"><div class="num" id="sTotal">-</div><div class="label">Total Users</div></div>
  <div class="stat-card"><div class="num" id="sResumes">-</div><div class="label">Resumes Created</div></div>
  <div class="stat-card"><div class="num" id="sAnalyses">-</div><div class="label">ATS Analyses</div></div>
  <div class="stat-card"><div class="num" id="sInterviews">-</div><div class="label">Interview Sessions</div></div>
  <div class="stat-card"><div class="num" id="sAvgAts">-</div><div class="label">Avg ATS Score</div></div>
  <div class="stat-card"><div class="num" id="sNew7d">-</div><div class="label">New (7 days)</div></div>
</div>

<div class="card">
  <h3>👥 All Users</h3>
  <div class="error" id="error" style="display:none;"></div>
  <div style="overflow-x:auto;">
    <table>
      <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Resumes</th><th>Analyses</th><th>Interviews</th><th>Joined</th><th>Actions</th></tr></thead>
      <tbody id="usersBody"><tr><td colspan="8" style="text-align:center;color:var(--text2);">Loading...</td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API = '';
const TOKEN = () => localStorage.getItem('auth_token');
const headers = () => ({ 'Content-Type':'application/json', 'Authorization':`Bearer ${TOKEN()}` });

async function loadStats() {
  try {
    const r = await fetch(API+'/api/admin/stats', { headers:headers() });
    if (r.status === 403) { window.location.href='/dashboard'; return; }
    if (!r.ok) throw new Error();
    const d = await r.json();
    document.getElementById('sTotal').textContent = d.overview.totalUsers;
    document.getElementById('sResumes').textContent = d.overview.totalResumes;
    document.getElementById('sAnalyses').textContent = d.overview.totalAnalyses;
    document.getElementById('sInterviews').textContent = d.overview.totalInterviews;
    document.getElementById('sAvgAts').textContent = d.overview.avgAtsScore ? d.overview.avgAtsScore+'%' : '—';
    document.getElementById('sNew7d').textContent = d.last7Days.newUsers;
  } catch(e) { console.error(e); }
}

async function loadUsers() {
  try {
    const r = await fetch(API+'/api/admin/users', { headers:headers() });
    if (!r.ok) throw new Error();
    const d = await r.json();
    document.getElementById('usersBody').innerHTML = d.users.map(u => `
      <tr>
        <td>${u.name||'-'} ${u.isAdmin?'<span class="badge badge-admin">Admin</span>':''}</td>
        <td>${u.email} ${u.authProvider==='google'?'<span class="badge badge-google">G</span>':''}</td>
        <td>${u.plan||'none'}</td>
        <td>${u.resumes}</td>
        <td>${u.analyses}</td>
        <td>${u.interviews}</td>
        <td>${u.joined}</td>
        <td><button class="btn-sm btn-del" onclick="deleteUser(${u.id},'${u.email}')">Delete</button></td>
      </tr>
    `).join('');
  } catch(e) {
    document.getElementById('error').textContent = 'Failed to load users';
    document.getElementById('error').style.display = 'block';
  }
}

async function deleteUser(id, email) {
  if (!confirm(`Delete user ${email}? This cannot be undone.`)) return;
  try {
    const r = await fetch(API+'/api/admin/delete-user', { method:'DELETE', headers:headers(), body:JSON.stringify({userId:id}) });
    if (!r.ok) { const d=await r.json(); alert(d.error); return; }
    loadUsers(); loadStats();
  } catch(e) { alert('Failed to delete'); }
}

if (!TOKEN()) { window.location.href='/'; }
loadStats();
loadUsers();
</script>
</body>
</html>
